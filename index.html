<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"
    />
    <meta
      name="description"
      content="Multi-currency calculator — convert fiat and cryptocurrencies in real time"
    />
    <meta
      name="theme-color"
      content="#0D1117"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#F6F8FA"
      media="(prefers-color-scheme: light)"
    />
    <title>currex – Multi-currency Calculator</title>

    <!-- Apply theme + language before render to avoid flash of unstyled/wrong content (FOUC) -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme") || "system";
          var prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          var dark = stored === "dark" || (stored === "system" && prefersDark);
          if (dark) document.documentElement.classList.add("dark");

          var lang = localStorage.getItem("lang");
          if (!lang) {
            lang = (navigator.language || "en").split("-")[0].toLowerCase();
          }
          document.documentElement.lang = lang;
          var rtl = ["ar", "he", "fa", "ur"].indexOf(lang) !== -1;
          document.documentElement.dir = rtl ? "rtl" : "ltr";
        } catch (e) {}
      })();
    </script>

    <!-- iOS icons (relative path works on the /currex/ subpath deploy) -->
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
